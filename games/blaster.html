<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Block Blaster · PlayCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/game.css" />
    <style>
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 26px;
        height: 26px;
        margin: -13px 0 0 -13px;
        z-index: 12;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s;
      }
      #crosshair.show { opacity: 0.9; }
      #crosshair::before,
      #crosshair::after {
        content: "";
        position: absolute;
        background: #fff;
        box-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
      }
      #crosshair::before { left: 12px; top: 0; width: 2px; height: 26px; }
      #crosshair::after { top: 12px; left: 0; height: 2px; width: 26px; }
    </style>
  </head>
  <body>
    <div class="gk-loading" id="loading">Loading…</div>
    <div id="crosshair"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="../js/gamekit.js"></script>
    <script>
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x101826);
      scene.fog = new THREE.Fog(0x101826, 40, 120);
      const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 500);
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);
      GK.handleResize(renderer, camera);

      scene.add(new THREE.HemisphereLight(0x9fb8ff, 0x202840, 1.0));
      const dir = new THREE.DirectionalLight(0xffffff, 0.8);
      dir.position.set(10, 30, 10);
      dir.castShadow = true;
      scene.add(dir);

      // Arena floor + grid
      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(120, 120),
        new THREE.MeshLambertMaterial({ color: 0x1c2740 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -8;
      floor.receiveShadow = true;
      scene.add(floor);
      const grid = new THREE.GridHelper(120, 40, 0x3a4a72, 0x2a3556);
      grid.position.y = -7.98;
      scene.add(grid);

      // Back wall
      const wall = new THREE.Mesh(
        new THREE.PlaneGeometry(120, 60),
        new THREE.MeshLambertMaterial({ color: 0x162038 })
      );
      wall.position.set(0, 0, -45);
      scene.add(wall);

      // ---- Targets ----
      const targets = [];
      const tgtGeo = new THREE.BoxGeometry(2.4, 2.4, 2.4);
      function spawnTarget() {
        const hue = Math.random() * 60 + 280; // pink/purple
        const mat = new THREE.MeshLambertMaterial({ color: new THREE.Color(`hsl(${hue},80%,60%)`), emissive: new THREE.Color(`hsl(${hue},80%,15%)`) });
        const m = new THREE.Mesh(tgtGeo, mat);
        m.castShadow = true;
        m.position.set((Math.random() - 0.5) * 50, (Math.random() - 0.3) * 18, -15 - Math.random() * 22);
        const vel = new THREE.Vector3((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 4, 0);
        scene.add(m);
        targets.push({ mesh: m, vel });
      }

      // ---- First person look ----
      let yaw = 0,
        pitch = 0;
      camera.position.set(0, 0, 8);
      const raycaster = new THREE.Raycaster();

      const game = { started: false, over: false, score: 0, time: 30, locked: false };

      GK.topbar("Block Blaster");
      const setHud = GK.hud([
        { key: "score", label: "Score", value: "0" },
        { key: "time", label: "Time", value: "30s" },
      ]);
      const crosshair = document.getElementById("crosshair");

      // Touch support: drag to aim, FIRE button to shoot (no pointer lock on touch)
      const isTouchDev = GK.isTouch();
      const touch = GK.touchControls({
        buttons: [{ id: "fire", label: "FIRE", right: 34, bottom: 44, size: 104, color: "rgba(255,94,156,0.9)" }],
      });
      touch.onPress("fire", () => shoot());
      if (isTouchDev) {
        let aimId = null,
          alx = 0,
          aly = 0;
        window.addEventListener(
          "touchstart",
          (e) => {
            for (const t of e.changedTouches) {
              if (t.target && t.target.closest && t.target.closest(".gk-touch")) continue;
              if (aimId === null) {
                aimId = t.identifier;
                alx = t.clientX;
                aly = t.clientY;
              }
            }
          },
          { passive: true }
        );
        window.addEventListener(
          "touchmove",
          (e) => {
            for (const t of e.changedTouches) {
              if (t.identifier === aimId) {
                yaw -= (t.clientX - alx) * 0.005;
                pitch = Math.max(-1.3, Math.min(1.3, pitch - (t.clientY - aly) * 0.005));
                alx = t.clientX;
                aly = t.clientY;
              }
            }
          },
          { passive: true }
        );
        const aimEnd = (e) => {
          for (const t of e.changedTouches) if (t.identifier === aimId) aimId = null;
        };
        window.addEventListener("touchend", aimEnd);
        window.addEventListener("touchcancel", aimEnd);
      }

      const ov = GK.overlay(
        {
          icon: "🎯",
          title: "Block Blaster",
          desc: "Blast as many glowing targets as you can in 30 seconds!",
          controls: ["Mouse / Drag — Aim", "Click / FIRE — Shoot"],
          button: "🔫 Start Blasting",
          mobileNote: "Desktop: click to lock the mouse. Mobile: drag to aim, tap FIRE.",
        },
        startGame
      );

      function startGame() {
        ov.hide();
        targets.forEach((t) => scene.remove(t.mesh));
        targets.length = 0;
        game.score = 0;
        game.time = 30;
        game.started = true;
        game.over = false;
        setHud("score", "0");
        for (let i = 0; i < 6; i++) spawnTarget();
        if (isTouchDev) {
          game.locked = true;
          crosshair.classList.add("show");
        } else {
          renderer.domElement.requestPointerLock();
        }
      }

      document.addEventListener("pointerlockchange", () => {
        game.locked = document.pointerLockElement === renderer.domElement;
        crosshair.classList.toggle("show", game.locked);
      });

      document.addEventListener("mousemove", (e) => {
        if (!game.locked) return;
        yaw -= e.movementX * 0.0022;
        pitch -= e.movementY * 0.0022;
        pitch = Math.max(-1.3, Math.min(1.3, pitch));
      });

      // Re-lock on click if game running but pointer not locked
      renderer.domElement.addEventListener("click", () => {
        if (!isTouchDev && game.started && !game.over && !game.locked) {
          renderer.domElement.requestPointerLock();
        }
      });

      function shoot() {
        if (!game.started || game.over || !game.locked) return;
        muzzleFlash();
        raycaster.setFromCamera({ x: 0, y: 0 }, camera);
        const hits = raycaster.intersectObjects(targets.map((t) => t.mesh));
        if (hits.length) {
          const mesh = hits[0].object;
          const idx = targets.findIndex((t) => t.mesh === mesh);
          if (idx >= 0) {
            burst(mesh.position, mesh.material.color);
            scene.remove(mesh);
            targets.splice(idx, 1);
            game.score++;
            setHud("score", game.score);
            spawnTarget();
          }
        }
      }
      document.addEventListener("mousedown", (e) => {
        if (game.locked && e.button === 0) shoot();
      });

      // muzzle flash light
      const flash = new THREE.PointLight(0xffd27f, 0, 20);
      scene.add(flash);
      let flashT = 0;
      function muzzleFlash() {
        flash.position.copy(camera.position);
        flash.intensity = 3;
        flashT = 0.08;
      }

      // hit particles
      const bursts = [];
      function burst(pos, color) {
        for (let i = 0; i < 10; i++) {
          const p = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshBasicMaterial({ color }));
          p.position.copy(pos);
          const v = new THREE.Vector3((Math.random() - 0.5) * 14, (Math.random() - 0.5) * 14, (Math.random() - 0.5) * 14);
          scene.add(p);
          bursts.push({ mesh: p, vel: v, life: 0.6 });
        }
      }

      function endGame() {
        game.over = true;
        game.started = false;
        if (document.pointerLockElement) document.exitPointerLock();
        ov.setContent(
          {
            scoreBig: game.score,
            icon: "🎯",
            title: "Time's Up!",
            desc: `You blasted ${game.score} target${game.score === 1 ? "" : "s"}. Sharp shooting!`,
            button: "↻ Play Again",
          },
          () => {
            ov.hide();
            startGame();
          }
        );
        ov.show();
      }

      function update(dt) {
        // camera orientation
        const e = new THREE.Euler(pitch, yaw, 0, "YXZ");
        camera.quaternion.setFromEuler(e);

        if (game.started && !game.over) {
          game.time -= dt;
          setHud("time", Math.max(0, game.time).toFixed(1) + "s");
          if (game.time <= 0) endGame();
        }

        // target movement (bounce within bounds)
        targets.forEach((t) => {
          t.mesh.position.addScaledVector(t.vel, dt);
          t.mesh.rotation.x += dt;
          t.mesh.rotation.y += dt * 1.3;
          const p = t.mesh.position;
          if (Math.abs(p.x) > 26) t.vel.x *= -1;
          if (p.y > 12 || p.y < -6) t.vel.y *= -1;
        });

        // flash decay
        if (flashT > 0) {
          flashT -= dt;
          flash.intensity = Math.max(0, (flashT / 0.08) * 3);
        }

        // bursts
        for (let i = bursts.length - 1; i >= 0; i--) {
          const b = bursts[i];
          b.vel.y -= 18 * dt;
          b.mesh.position.addScaledVector(b.vel, dt);
          b.life -= dt;
          b.mesh.scale.multiplyScalar(1 - dt * 1.5);
          if (b.life <= 0) {
            scene.remove(b.mesh);
            bursts.splice(i, 1);
          }
        }
      }

      let last = performance.now();
      function loop(now) {
        const dt = Math.min((now - last) / 1000, 0.05);
        last = now;
        update(dt);
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
      }
      document.getElementById("loading").remove();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
