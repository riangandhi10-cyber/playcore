<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speed Racer 3D · PlayCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/game.css" />
  </head>
  <body>
    <div class="gk-loading" id="loading">Loading…</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="../js/gamekit.js"></script>
    <script>
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x9fd3ff);
      scene.fog = new THREE.Fog(0x9fd3ff, 90, 220);

      const camera = new THREE.PerspectiveCamera(62, innerWidth / innerHeight, 0.1, 600);
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);
      GK.handleResize(renderer, camera);

      const sun = new THREE.DirectionalLight(0xffffff, 1.0);
      sun.position.set(40, 80, 20);
      sun.castShadow = true;
      sun.shadow.mapSize.set(2048, 2048);
      sun.shadow.camera.left = sun.shadow.camera.bottom = -120;
      sun.shadow.camera.right = sun.shadow.camera.top = 120;
      scene.add(sun);
      scene.add(new THREE.HemisphereLight(0xcfeaff, 0x3a6b2a, 0.7));

      // Grass ground
      const ground = new THREE.Mesh(
        new THREE.CircleGeometry(180, 48),
        new THREE.MeshLambertMaterial({ color: 0x4a9b3a })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      // Track (flat annulus)
      const R_IN = 38,
        R_OUT = 58,
        R_MID = (R_IN + R_OUT) / 2;
      const road = new THREE.Mesh(
        new THREE.RingGeometry(R_IN, R_OUT, 80),
        new THREE.MeshLambertMaterial({ color: 0x37383d })
      );
      road.rotation.x = -Math.PI / 2;
      road.position.y = 0.02;
      road.receiveShadow = true;
      scene.add(road);

      // Lane stripes
      for (let i = 0; i < 40; i++) {
        const a = (i / 40) * Math.PI * 2;
        const stripe = new THREE.Mesh(
          new THREE.BoxGeometry(0.6, 0.05, 3),
          new THREE.MeshLambertMaterial({ color: 0xffe14d })
        );
        stripe.position.set(Math.cos(a) * R_MID, 0.06, Math.sin(a) * R_MID);
        stripe.rotation.y = -a;
        scene.add(stripe);
      }

      // Decorative trees outside track
      for (let i = 0; i < 30; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = R_OUT + 12 + Math.random() * 60;
        const trunk = new THREE.Mesh(
          new THREE.CylinderGeometry(0.6, 0.6, 3, 5),
          new THREE.MeshLambertMaterial({ color: 0x6b4423 })
        );
        const leaves = new THREE.Mesh(
          new THREE.ConeGeometry(2.4, 5, 6),
          new THREE.MeshLambertMaterial({ color: 0x2e8b3a })
        );
        leaves.position.y = 3.6;
        const tree = new THREE.Group();
        tree.add(trunk, leaves);
        tree.position.set(Math.cos(a) * r, 1.5, Math.sin(a) * r);
        tree.children.forEach((c) => (c.castShadow = true));
        scene.add(tree);
      }

      // ---- Checkpoints / gates ----
      const NCP = 8;
      const checkpoints = [];
      for (let i = 0; i < NCP; i++) {
        const a = (i / NCP) * Math.PI * 2;
        const x = Math.cos(a) * R_MID,
          z = Math.sin(a) * R_MID;
        const group = new THREE.Group();
        const isFinish = i === 0;
        const colColor = isFinish ? 0xffffff : 0x00d2ff;
        [-1, 1].forEach((s) => {
          const post = new THREE.Mesh(
            new THREE.BoxGeometry(0.8, 8, 0.8),
            new THREE.MeshLambertMaterial({ color: colColor })
          );
          // offset posts perpendicular to radius
          post.position.set(Math.cos(a + Math.PI / 2) * 9 * s, 4, Math.sin(a + Math.PI / 2) * 9 * s);
          post.castShadow = true;
          group.add(post);
        });
        group.position.set(x, 0, z);
        scene.add(group);
        checkpoints.push({ x, z, group, posts: group.children });
      }
      function highlight(idx) {
        checkpoints.forEach((cp, i) => {
          const c = i === idx ? 0xffd700 : i === 0 ? 0xffffff : 0x00d2ff;
          cp.posts.forEach((p) => p.material.color.setHex(c));
        });
      }

      // ---- Car ----
      const car = new THREE.Group();
      const bodyLo = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.8, 4), new THREE.MeshLambertMaterial({ color: 0xff3d3d }));
      bodyLo.position.y = 0.7;
      const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.8, 2), new THREE.MeshLambertMaterial({ color: 0x222831 }));
      cabin.position.set(0, 1.45, -0.2);
      [bodyLo, cabin].forEach((m) => {
        m.castShadow = true;
        car.add(m);
      });
      const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 10);
      const wheelMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
      [
        [-1.1, 0.5, 1.3],
        [1.1, 0.5, 1.3],
        [-1.1, 0.5, -1.3],
        [1.1, 0.5, -1.3],
      ].forEach((p) => {
        const w = new THREE.Mesh(wheelGeo, wheelMat);
        w.rotation.z = Math.PI / 2;
        w.position.set(...p);
        w.castShadow = true;
        car.add(w);
      });
      scene.add(car);

      const keys = GK.keys();
      GK.topbar("Speed Racer 3D");
      const setHud = GK.hud([
        { key: "lap", label: "Lap", value: "1 / 3" },
        { key: "cp", label: "Gate", value: "0 / " + NCP },
        { key: "time", label: "Time", value: "0.0s" },
        { key: "speed", label: "Speed", value: "0" },
      ]);

      const sim = {
        started: false,
        finished: false,
        heading: -Math.PI / 2,
        speed: 0,
        pos: new THREE.Vector3(R_MID, 0, 0),
        nextCp: 1,
        lap: 1,
        laps: 3,
        time: 0,
      };

      const ov = GK.overlay(
        {
          icon: "🏎️",
          title: "Speed Racer 3D",
          desc: "Race 3 laps around the track. Pass through every glowing gate in order!",
          controls: ["↑ / W — Gas", "↓ / S — Brake", "← → / A D — Steer"],
          button: "🏁 Start Race",
          mobileNote: "Best played on desktop with a keyboard.",
        },
        startGame
      );

      function startGame() {
        ov.hide();
        sim.started = true;
        sim.finished = false;
        sim.heading = -Math.PI / 2;
        sim.speed = 0;
        sim.pos.set(R_MID, 0, 0);
        sim.nextCp = 1;
        sim.lap = 1;
        sim.time = 0;
        setHud("lap", "1 / 3");
        highlight(1);
      }

      const ACCEL = 26,
        BRAKE = 40,
        MAXF = 52,
        MAXR = -16,
        DRAG = 0.6,
        TURN = 2.4;

      function update(dt) {
        if (!sim.started || sim.finished) return;
        sim.time += dt;
        setHud("time", sim.time.toFixed(1) + "s");

        const gas = keys["ArrowUp"] || keys["KeyW"];
        const brake = keys["ArrowDown"] || keys["KeyS"];
        if (gas) sim.speed += ACCEL * dt;
        else if (brake) sim.speed -= BRAKE * dt;
        else sim.speed -= Math.sign(sim.speed) * DRAG * 10 * dt;
        sim.speed = Math.max(MAXR, Math.min(MAXF, sim.speed));

        // off-road penalty
        const r = Math.hypot(sim.pos.x, sim.pos.z);
        const onRoad = r > R_IN - 2 && r < R_OUT + 2;
        if (!onRoad) sim.speed *= 0.96;

        // steering scales with speed (right turns toward screen-right behind the car)
        const steer = (keys["ArrowRight"] || keys["KeyD"] ? 1 : 0) - (keys["ArrowLeft"] || keys["KeyA"] ? 1 : 0);
        sim.heading += steer * TURN * dt * Math.min(1, Math.abs(sim.speed) / 12) * Math.sign(sim.speed || 1);

        sim.pos.x += Math.cos(sim.heading) * sim.speed * dt;
        sim.pos.z += Math.sin(sim.heading) * sim.speed * dt;

        car.position.set(sim.pos.x, 0, sim.pos.z);
        car.rotation.y = -sim.heading + Math.PI / 2;

        setHud("speed", Math.round(Math.abs(sim.speed) * 3.6) + " km/h");

        // Checkpoint detection
        const cp = checkpoints[sim.nextCp];
        if (Math.hypot(sim.pos.x - cp.x, sim.pos.z - cp.z) < 11) {
          sim.nextCp = (sim.nextCp + 1) % NCP;
          setHud("cp", (sim.nextCp === 0 ? NCP : sim.nextCp) + " / " + NCP);
          if (sim.nextCp === 0) {
            // crossing finish -> potential next checkpoint is the start gate again handled below
            sim.nextCp = NCP; // sentinel: must pass finish line
          }
          highlight(sim.nextCp % NCP);
          GK.toast("Gate ✓", 600);
        }
        // Finish line (gate 0) after all checkpoints
        if (sim.nextCp === NCP) {
          const f = checkpoints[0];
          if (Math.hypot(sim.pos.x - f.x, sim.pos.z - f.z) < 11) {
            sim.lap++;
            if (sim.lap > sim.laps) {
              finish();
              return;
            }
            setHud("lap", sim.lap + " / " + sim.laps);
            GK.toast("🏁 Lap " + (sim.lap - 1) + " done!", 1100);
            sim.nextCp = 1;
            highlight(1);
          }
        }

        // Chase camera
        const camDist = 11,
          camH = 6;
        const cx = sim.pos.x - Math.cos(sim.heading) * camDist;
        const cz = sim.pos.z - Math.sin(sim.heading) * camDist;
        camera.position.lerp(new THREE.Vector3(cx, camH, cz), 1 - Math.pow(0.0015, dt));
        camera.lookAt(sim.pos.x, 1.5, sim.pos.z);
      }

      function finish() {
        sim.finished = true;
        ov.setContent(
          {
            scoreBig: sim.time.toFixed(1) + "s",
            icon: "🏆",
            title: "Race Finished!",
            desc: "You completed all 3 laps. Can you go faster?",
            button: "↻ Race Again",
          },
          () => {
            ov.hide();
            startGame();
          }
        );
        ov.show();
      }

      let last = performance.now();
      function loop(now) {
        const dt = Math.min((now - last) / 1000, 0.05);
        last = now;
        update(dt);
        renderer.render(scene, camera);
        requestAnimationFrame(loop);
      }
      document.getElementById("loading").remove();
      camera.position.set(R_MID, 8, 14);
      car.position.set(R_MID, 0, 0);
      highlight(1);
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
